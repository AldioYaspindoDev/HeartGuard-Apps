  <style>
    body { font-family: "Roboto", sans-serif; }
    @font-face {
      font-family: 'Nasalization';
      src: url('font/Nasalization Rg.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }
    .logo { font-family: 'Nasalization', sans-serif; } 

    .faq-answer {
      transition: all 0.5s ease-in-out;
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      margin-top: 0;
    }

    .faq-answer.show {
      max-height: 200px;
      opacity: 1;
      margin-top: 0.5rem;
    }

    .rotate {
      transform: rotate(180deg);
      transition: transform 0.3s ease;
    }

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const titleElement = document.getElementById('heartguard-title');
    const resetButton = document.getElementById('reset-button');
    const header = document.getElementById('main-header');
    const heartContainer = document.getElementById('heart-container');
    const heartImage = document.getElementById('heart-image');

    // Jalankan efek ketikan saat halaman dimuat
    if (titleElement) {
      typeEffect(titleElement, "HeartGuard", 150);
    }

    // Tombol untuk reset efek ketikan
    if (resetButton && titleElement) {
      resetButton.addEventListener('click', function () {
        resetTypeEffect(titleElement, "HeartGuard", 150);
      });
    }

    // Scroll behavior: sembunyikan header saat scroll ke bawah
    let lastScrollPosition = window.scrollY;

    function handleScroll() {
      const currentScrollPosition = window.scrollY;

      if (header) {
        if (currentScrollPosition > lastScrollPosition && currentScrollPosition > 50) {
          header.classList.add('-translate-y-full');
        } else if (currentScrollPosition < lastScrollPosition) {
          header.classList.remove('-translate-y-full');
        }
      }

      lastScrollPosition = currentScrollPosition;
    }

    window.addEventListener('scroll', handleScroll);

    // Efek gambar mengikuti kursor saat hover
    const maxMovement = 30;

    if (heartContainer && heartImage) {
      heartContainer.addEventListener('mousemove', (e) => {
        const rect = heartContainer.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const relativeX = x / rect.width;
        const relativeY = y / rect.height;

        const moveX = (relativeX - 0.5) * 2 * maxMovement;
        const moveY = (relativeY - 0.5) * 2 * maxMovement;

        heartImage.style.transform = `translateX(-50%) translate(${moveX}px, ${moveY}px)`;
      });

      heartContainer.addEventListener('mouseleave', () => {
        heartImage.style.transform = 'translateX(-50%)';
      });
    }
  });

  function typeEffect(element, text, speed) {
  let i = 0;
  element.textContent = '';

  function addCharacter() {
    if (i < text.length) {
      element.textContent += text.charAt(i);
      i++;
      setTimeout(addCharacter, speed);
    } else {
      // Setelah selesai mengetik, tunggu 1 detik lalu ulangi
      setTimeout(() => {
        typeEffect(element, text, speed);
      }, 1000); // 1000ms = 1 detik
    }
  }

  addCharacter();
}

  function resetTypeEffect(element, text, speed) {
    element.textContent = '';
    typeEffect(element, text, speed);
  }

  // Toggle FAQ
  function toggleAnswer(id) {
    const content = document.getElementById(id);
    if (content) {
      content.classList.toggle("hidden");
    }
  }

  function toggleAnswer(id, iconId) {
      const content = document.getElementById(id);
      const icon = document.getElementById(iconId);
      content.classList.toggle('show');
      icon.classList.toggle('rotate');
    }
</script>

</body>
</html>
